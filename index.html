<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeakUP - 考研早起打卡</title>
    <!-- Use Inter font for a clean, modern look -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Feather icons for UI elements -->
    <script src="https://unpkg.com/feather-icons"></script>
    <!-- html2canvas for poster generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>
    <div id="app">
        <!-- Dashboard View -->
        <main id="view-dashboard" class="view active">
            <header class="glass-panel">
                <div class="greeting">
                    <h1 id="greeting-text">Morning, 考研人</h1>
                    <p class="subtitle">100元押金挑战 · 第 <span id="current-day-badge">1</span> 天</p>
                </div>
                <div class="header-actions">
                    <button id="btn-calendar" class="icon-btn header-btn"
                        style="width:36px; height:36px; background:rgba(255,255,255,0.1); border-radius:50%; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.2);"><i
                            data-feather="calendar" style="width:16px; height:16px;"></i></button>
                    <div class="header-icon" style="width:40px; height:40px;"><i data-feather="sun"
                            style="width:20px; height:20px;"></i></div>
                </div>
            </header>

            <section class="stats-container glass-panel">
                <div class="stat-box">
                    <div class="stat-label">累计获得宝宝金</div>
                    <div class="stat-value highlight"><span class="currency">¥</span><span id="total-earnings">0</span>
                    </div>
                    <div class="stat-sub">预期最高: ¥300</div>
                </div>

                <div class="progress-circle-wrap">
                    <svg class="progress-ring" width="120" height="120">
                        <circle class="progress-ring__backdrop" stroke="#e0e0e0" stroke-width="8" fill="transparent"
                            r="52" cx="60" cy="60" />
                        <circle class="progress-ring__circle" id="progress-circle" stroke="url(#gradient)"
                            stroke-width="8" stroke-linecap="round" fill="transparent" r="52" cx="60" cy="60" />
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#FF9A9E" />
                                <stop offset="100%" stop-color="#FECFEF" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="progress-text">
                        <span id="days-checked">0</span><span class="total-days">/30</span>
                        <div class="progress-label">坚持天数</div>
                    </div>
                </div>
            </section>

            <div class="action-container">
                <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
                <button id="btn-checkin" class="primary-btn pulse-anim">
                    <i data-feather="camera"></i> 起床拍照打卡
                </button>
                <div class="time-limit-hint"><i data-feather="clock"></i> 每日 06:40 前有效</div>
            </div>

            <!-- Toast Notification -->
            <div id="toast" class="toast hidden"></div>
        </main>

        <!-- Calendar View -->
        <main id="view-calendar" class="view hidden">
            <header class="glass-panel" style="display:flex; align-items:center;">
                <button id="btn-calendar-back" class="icon-btn" style="flex:1;"><i data-feather="chevron-left"></i>
                    返回</button>
                <h2 style="flex:2; text-align:center; font-size:18px;">打卡历程</h2>
                <div style="flex:1;"></div>
            </header>
            <div class="glass-panel calendar-wrapper"
                style="margin-top:16px; flex-grow:1; overflow-y:auto; padding-bottom: 40px;">
                <div class="calendar-grid" id="calendar-grid"
                    style="display:grid; grid-template-columns:repeat(5, 1fr); gap:12px;">
                    <!-- generated by js -->
                </div>

                <div style="text-align: center; margin-top: 40px;">
                    <button id="btn-reset"
                        style="background:none; border:none; color:var(--text-muted); font-size:12px; text-decoration:underline; cursor:pointer; opacity:0.8;"><i
                            data-feather="trash-2"
                            style="width:12px; height:12px; margin-right:4px;"></i>清除所有数据，重新开始</button>
                </div>
            </div>
        </main>

        <!-- Preview & Share View -->
        <main id="view-preview" class="view hidden">
            <header class="glass-panel text-center">
                <button id="btn-back" class="icon-btn"><i data-feather="chevron-left"></i> 返回</button>
                <h2>今日打卡日签</h2>
            </header>

            <div id="poster-area" class="poster-card">
                <img id="preview-image" src="" alt="Captured Image">
                <div class="poster-overlay">
                    <div class="poster-header">
                        <div class="poster-time" id="poster-time">06:15 AM</div>
                        <div class="poster-date" id="poster-date">2026.04.08</div>
                    </div>
                    <div class="poster-footer"
                        style="flex-direction:column; align-items:flex-start; gap: 12px; width:100%;">
                        <div class="poster-quote" id="poster-quote"
                            style="font-size: 14px; font-style: italic; line-height: 1.5; color: rgba(255,255,255,0.9); margin-bottom: 8px;">
                        </div>
                        <div style="display:flex; justify-content:space-between; width:100%; align-items:flex-end;">
                            <div class="poster-info">
                                <div class="poster-title">WeakUP 早起挑战</div>
                                <div class="poster-desc">Day <span id="poster-day">1</span> / 30</div>
                            </div>
                            <div class="poster-earnings">
                                今日 +10¥
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-container">
                <div class="success-msg"><i data-feather="check-circle"></i> 打卡成功！长按上方卡片保存并发送给我哦~</div>
                <button id="btn-generate-poster" class="primary-btn outline">
                    <i data-feather="download"></i> 保存日签
                </button>
            </div>
        </main>
    </div>

    <!-- Hidden canvas for image processing -->
    <canvas id="hidden-canvas" style="display: none;"></canvas>

    <script src="app.js"></script>
</body>

</html>
